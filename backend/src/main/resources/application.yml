server:
  port: 9090

spring:
  application:
    name: mochu-oa
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/mochu_oa?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: mochu@2026
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1800000
  
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 10
          min-idle: 5
          max-wait: -1ms

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.mochu.oa.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

minio:
  endpoint: http://localhost:9000
  accessKey: minioadmin
  secretKey: minioadmin
  bucketName: mochu-oa

jwt:
  secret: mochu-oa-jwt-secret-key-2026-spring-boot-v3
  expiration: 2592000000  # 30天

ocr:
  tesseract:
    enabled: false
    # macOS(Homebrew) 常见路径: /opt/homebrew/share/tessdata
    datapath: ""
    # 相对路径图片会自动拼接此地址，如 /uploads/xx.jpg -> ${base-url}/uploads/xx.jpg
    base-url: http://127.0.0.1:9090
    language: chi_sim+eng
    psm: 6
    oem: 1
    timeout-seconds: 5
    cache-ttl-seconds: 600
    metrics-log-interval: 50

knife4j:
  enable: true
  setting:
    language: zh_cn